<script type="module">
import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

/* ============================================================
   Deterministic random + value noise. Every texture, building
   and placement derives from these so the street is stable.
   ============================================================ */
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(20260613);
function rrange(a, b) { return a + (b - a) * rand(); }
function clamp01(v) { return Math.min(1, Math.max(0, v)); }
function clampv(v, a, b) { return Math.min(b, Math.max(a, v)); }
function smooth01(t) { t = clamp01(t); return t * t * (3 - 2 * t); }

function makeValueNoise(seed) {
  const r = mulberry32(seed);
  const N = 128;
  const grid = new Float32Array(N * N);
  for (let i = 0; i < N * N; i++) grid[i] = r();
  return function (x, y) {
    x = ((x % N) + N) % N; y = ((y % N) + N) % N;
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const x2 = (xi + 1) % N, y2 = (yi + 1) % N;
    const sx = xf * xf * (3 - 2 * xf), sy = yf * yf * (3 - 2 * yf);
    const a = grid[yi * N + xi], b = grid[yi * N + x2];
    const c = grid[y2 * N + xi], d = grid[y2 * N + x2];
    return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
  };
}
function fbm(noise, x, y, oct) {
  let amp = 1, f = 1, sum = 0, norm = 0;
  for (let i = 0; i < oct; i++) {
    sum += amp * noise(x * f, y * f);
    norm += amp; amp *= 0.5; f *= 2.03;
  }
  return sum / norm;
}
function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}
function asTexture(canvas, srgb, repX, repY) {
  const t = new THREE.CanvasTexture(canvas);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repX || 1, repY || 1);
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  return t;
}

/* ============================================================
   Procedural textures — facades, ground, glass, signage.
   ============================================================ */

/* Weathered plaster, tinted per building via material.color. */
function makePlasterSet(seedBase) {
  const S = 512;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  const idC = xc.createImageData(S, S), idB = xb.createImageData(S, S);
  const n1 = makeValueNoise(seedBase + 1);
  const n2 = makeValueNoise(seedBase + 2);
  const n3 = makeValueNoise(seedBase + 3);
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      const u = x / S * 9, v = y / S * 22;
      const base = 0.86 + 0.14 * fbm(n1, u, v, 5);
      const blotch = fbm(n2, x / S * 3.6, y / S * 3.6, 4);
      let shade = base * (1.0 - 0.12 * Math.max(0, blotch - 0.55) * 2.2);
      const streak = fbm(n3, x / S * 22, y / S * 2.2, 3);
      const topW = 0.3 + 0.7 * (1 - y / S);
      shade *= 1.0 - 0.15 * Math.max(0, streak - 0.58) * 2.6 * topW;
      shade = Math.min(1, Math.max(0.38, shade));
      const r = shade * 255, g = shade * 251, b = shade * 243;
      const i4 = (y * S + x) * 4;
      idC.data[i4] = r; idC.data[i4 + 1] = g; idC.data[i4 + 2] = b; idC.data[i4 + 3] = 255;
      const bump = 0.5 + 0.5 * fbm(n1, u * 2.2, v * 1.0, 5) - 0.2 * Math.max(0, blotch - 0.5);
      const bb = clamp01(bump) * 255;
      idB.data[i4] = bb; idB.data[i4 + 1] = bb; idB.data[i4 + 2] = bb; idB.data[i4 + 3] = 255;
    }
  }
  xc.putImageData(idC, 0, 0);
  xb.putImageData(idB, 0, 0);
  return {
    map: asTexture(cCol, true, 3, 1),
    bump: asTexture(cBmp, false, 3, 1)
  };
}

/* Standing-seam zinc roof. */
function makeTinRoofSet() {
  const S = 512;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  const n1 = makeValueNoise(4001);
  xc.fillStyle = '#5b655e'; xc.fillRect(0, 0, S, S);
  xb.fillStyle = '#808080'; xb.fillRect(0, 0, S, S);
  for (let i = 0; i < 900; i++) {
    const x = rand() * S, y = rand() * S;
    const v = fbm(n1, x * 0.02, y * 0.02, 3);
    xc.fillStyle = 'rgba(' + (70 + v * 40 | 0) + ',' + (80 + v * 40 | 0) + ',' + (74 + v * 36 | 0) + ',0.28)';
    xc.fillRect(x, y, rrange(6, 26), rrange(3, 9));
  }
  for (let i = 0; i < 26; i++) {
    const x = Math.floor(rand() * 16) * 32 + rrange(-2, 2);
    xc.fillStyle = 'rgba(96,72,52,' + rrange(0.06, 0.16) + ')';
    xc.fillRect(x, rand() * S * 0.5, rrange(2, 5), rrange(40, 180));
  }
  for (let x = 0; x < S; x += 32) {
    xc.fillStyle = 'rgba(255,255,255,0.13)'; xc.fillRect(x, 0, 2, S);
    xc.fillStyle = 'rgba(10,14,12,0.35)'; xc.fillRect(x + 2, 0, 2, S);
    xb.fillStyle = '#ffffff'; xb.fillRect(x, 0, 3, S);
    xb.fillStyle = '#3a3a3a'; xb.fillRect(x + 3, 0, 2, S);
  }
  for (let y = 0; y < S; y += 128) {
    xc.fillStyle = 'rgba(20,26,22,0.22)'; xc.fillRect(0, y, S, 2);
    xb.fillStyle = '#5a5a5a'; xb.fillRect(0, y, S, 2);
  }
  return { map: asTexture(cCol, true, 2, 1), bump: asTexture(cBmp, false, 2, 1) };
}

/* Asphalt for the carriageway: grain, wheel polish, patches.
   One tile spans the full carriageway width (u across x). */
function makeAsphaltSet() {
  const S = 512;
  const cCol = makeCanvas(S, S), cRgh = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xr = cRgh.getContext('2d');
  const idC = xc.createImageData(S, S), idR = xr.createImageData(S, S);
  const n1 = makeValueNoise(5001), n2 = makeValueNoise(5002);
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      const u = x / S;
      let v = 0.47 + 0.12 * fbm(n1, x * 0.07, y * 0.07, 4);
      const sp = n2(x * 1.3, y * 1.3);
      if (sp > 0.86) v += 0.10;
      if (sp < 0.10) v -= 0.07;
      const wp = Math.exp(-Math.pow((u - 0.175) / 0.045, 2)) + Math.exp(-Math.pow((u - 0.235) / 0.045, 2)) +
                 Math.exp(-Math.pow((u - 0.765) / 0.045, 2)) + Math.exp(-Math.pow((u - 0.825) / 0.045, 2));
      v *= 1.0 - 0.15 * Math.min(1, wp);
      v = clamp01(v);
      const i4 = (y * S + x) * 4;
      idC.data[i4] = v * 134; idC.data[i4 + 1] = v * 135; idC.data[i4 + 2] = v * 140; idC.data[i4 + 3] = 255;
      const ro = clamp01(0.86 - 0.12 * Math.min(1, wp) + 0.1 * (sp - 0.5)) * 255;
      idR.data[i4] = ro; idR.data[i4 + 1] = ro; idR.data[i4 + 2] = ro; idR.data[i4 + 3] = 255;
    }
  }
  xc.putImageData(idC, 0, 0); xr.putImageData(idR, 0, 0);
  for (let i = 0; i < 5; i++) {
    const px = rand() * S, py = rand() * S, pw = rrange(60, 170), ph = rrange(40, 110);
    xc.fillStyle = 'rgba(44,45,49,0.42)';
    xc.fillRect(px, py, pw, ph);
    xc.strokeStyle = 'rgba(14,14,16,0.65)'; xc.lineWidth = 4;
    xc.strokeRect(px, py, pw, ph);
  }
  xc.strokeStyle = 'rgba(18,18,20,0.5)'; xc.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    let cx = rand() * S, cy = rand() * S;
    xc.beginPath(); xc.moveTo(cx, cy);
    for (let k = 0; k < 9; k++) { cx += rrange(-26, 26); cy += rrange(10, 36); xc.lineTo(cx, cy); }
    xc.stroke();
  }
  return { map: asTexture(cCol, true, 1, 26), rough: asTexture(cRgh, false, 1, 26) };
}

/* Concrete slab sidewalk: big square pavers, joints, grime. */
function makeSidewalkSet() {
  const S = 512;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  const n1 = makeValueNoise(7001);
  xc.fillStyle = '#94928c'; xc.fillRect(0, 0, S, S);
  xb.fillStyle = '#b0b0b0'; xb.fillRect(0, 0, S, S);
  const idC = xc.getImageData(0, 0, S, S);
  for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
    const v = (fbm(n1, x * 0.05, y * 0.05, 4) - 0.5) * 36;
    const i4 = (y * S + x) * 4;
    idC.data[i4] += v; idC.data[i4 + 1] += v; idC.data[i4 + 2] += v;
  }
  xc.putImageData(idC, 0, 0);
  for (let i = 0; i < 80; i++) {
    xc.fillStyle = 'rgba(42,42,44,' + rrange(0.07, 0.26) + ')';
    xc.beginPath(); xc.arc(rand() * S, rand() * S, rrange(2, 9), 0, 6.28); xc.fill();
  }
  for (let k = 0; k < S; k += 128) {
    xc.fillStyle = 'rgba(38,37,35,0.6)';
    xc.fillRect(k, 0, 3, S); xc.fillRect(0, k, S, 3);
    xb.fillStyle = '#404040';
    xb.fillRect(k, 0, 3, S); xb.fillRect(0, k, S, 3);
  }
  return { map: asTexture(cCol, true, 2, 90), bump: asTexture(cBmp, false, 2, 90) };
}

/* Granite setts for the median strip, square and tree surrounds. */
function makeSettsSet() {
  const S = 512, COLS = 12, ROWS = 14;
  const cw = S / COLS, ch = S / ROWS;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  xc.fillStyle = '#56524b'; xc.fillRect(0, 0, S, S);
  xb.fillStyle = '#1a1a1a'; xb.fillRect(0, 0, S, S);
  const offs = [-S, 0, S];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const off = (r % 2) * cw * 0.5;
      const x0 = c * cw + off + cw * 0.5 + rrange(-1.2, 1.2);
      const y0 = r * ch + ch * 0.5 + rrange(-1.0, 1.0);
      const rx = cw * 0.45 * rrange(0.9, 1.0);
      const ry = ch * 0.44 * rrange(0.9, 1.0);
      const shade = rrange(0.85, 1.08);
      const tint = Math.floor(rand() * 3);
      let r0 = 148, g0 = 145, b0 = 140;
      if (tint === 1) { r0 += 9; g0 += 3; b0 -= 4; }
      if (tint === 2) { r0 -= 5; g0 -= 1; b0 += 6; }
      r0 *= shade; g0 *= shade; b0 *= shade;
      for (const ox of offs) for (const oy of offs) {
        const px = x0 + ox, py = y0 + oy;
        if (px < -cw * 2 || px > S + cw * 2 || py < -ch * 2 || py > S + ch * 2) continue;
        xc.save(); xc.translate(px, py);
        let gr = xc.createRadialGradient(-rx * 0.2, -ry * 0.25, 1, 0, 0, Math.max(rx, ry) * 1.15);
        gr.addColorStop(0, 'rgb(' + ((r0 * 1.12) | 0) + ',' + ((g0 * 1.12) | 0) + ',' + ((b0 * 1.12) | 0) + ')');
        gr.addColorStop(0.72, 'rgb(' + (r0 | 0) + ',' + (g0 | 0) + ',' + (b0 | 0) + ')');
        gr.addColorStop(1, 'rgb(' + ((r0 * 0.78) | 0) + ',' + ((g0 * 0.78) | 0) + ',' + ((b0 * 0.78) | 0) + ')');
        xc.fillStyle = gr;
        xc.fillRect(-rx, -ry, rx * 2, ry * 2);
        xc.restore();
        xb.save(); xb.translate(px, py);
        gr = xb.createRadialGradient(0, 0, 1, 0, 0, Math.max(rx, ry) * 1.1);
        gr.addColorStop(0, 'rgb(210,210,210)');
        gr.addColorStop(0.82, 'rgb(150,150,150)');
        gr.addColorStop(1, 'rgb(40,40,40)');
        xb.fillStyle = gr;
        xb.fillRect(-rx, -ry, rx * 2, ry * 2);
        xb.restore();
      }
    }
  }
  return {
    map: asTexture(cCol, true, 2, 2),
    bump: asTexture(cBmp, false, 2, 2)
  };
}

/* Cycle lane: oxide-red asphalt, bike pictogram + arrow per tile. */
function makeCycleTexture() {
  const W = 256, H = 1024;
  const c = makeCanvas(W, H), x = c.getContext('2d');
  const n1 = makeValueNoise(8001);
  x.fillStyle = '#7c4438'; x.fillRect(0, 0, W, H);
  const id = x.getImageData(0, 0, W, H);
  for (let yy = 0; yy < H; yy++) for (let xx = 0; xx < W; xx++) {
    const v = (fbm(n1, xx * 0.08, yy * 0.08, 3) - 0.5) * 26;
    const i4 = (yy * W + xx) * 4;
    id.data[i4] += v; id.data[i4 + 1] += v * 0.9; id.data[i4 + 2] += v * 0.8;
  }
  x.putImageData(id, 0, 0);
  // worn edge lines
  x.fillStyle = 'rgba(238,236,228,0.55)';
  x.fillRect(4, 0, 5, H); x.fillRect(W - 9, 0, 5, H);
  function bike(cx, cy, s) {
    x.save(); x.translate(cx, cy); x.scale(s, s);
    x.strokeStyle = 'rgba(240,238,230,0.92)'; x.fillStyle = 'rgba(240,238,230,0.92)';
    x.lineWidth = 4;
    x.beginPath(); x.arc(-20, 12, 13, 0, 6.28); x.stroke();
    x.beginPath(); x.arc(20, 12, 13, 0, 6.28); x.stroke();
    x.beginPath();
    x.moveTo(-20, 12); x.lineTo(-6, -8); x.lineTo(14, -8); x.lineTo(20, 12);
    x.moveTo(-6, -8); x.lineTo(2, 12); x.lineTo(20, 12);
    x.moveTo(-23, -14); x.lineTo(-6, -8);
    x.moveTo(14, -8); x.lineTo(12, -16); x.lineTo(20, -16);
    x.stroke();
    x.restore();
  }
  bike(W / 2, 300, 1.5);
  // direction arrow
  x.fillStyle = 'rgba(238,236,228,0.8)';
  x.beginPath(); x.moveTo(W / 2, 130); x.lineTo(W / 2 - 17, 176); x.lineTo(W / 2 + 17, 176); x.closePath(); x.fill();
  x.fillRect(W / 2 - 6, 176, 12, 50);
  return asTexture(c, true, 1, 18);
}

/* Tall cross-post window (korspostfönster). */
function makeWindowTexture(lit) {
  const W = 256, H = 408;
  const c = makeCanvas(W, H), x = c.getContext('2d');
  const fr = x.createLinearGradient(0, 0, W, H);
  fr.addColorStop(0, '#f2efe6'); fr.addColorStop(1, '#d6d2c4');
  x.fillStyle = fr; x.fillRect(0, 0, W, H);
  x.fillStyle = 'rgba(110,104,90,0.4)';
  x.fillRect(0, H - 18, W, 18);
  const M = 20, BAR = 11;
  const crossY = M + Math.floor((H - 2 * M) * 0.30);
  function pane(px, py, pw, ph) {
    let g;
    if (lit) {
      g = x.createRadialGradient(px + pw * 0.5, py + ph * 0.6, 4, px + pw * 0.5, py + ph * 0.6, pw * 1.1);
      g.addColorStop(0, '#ffd793'); g.addColorStop(0.55, '#df9650'); g.addColorStop(1, '#774726');
    } else {
      g = x.createLinearGradient(px, py, px + pw, py + ph);
      g.addColorStop(0, '#5d6c7c'); g.addColorStop(0.5, '#33404e'); g.addColorStop(1, '#222c38');
    }
    x.fillStyle = g; x.fillRect(px, py, pw, ph);
    x.fillStyle = lit ? 'rgba(255,242,205,0.16)' : 'rgba(218,230,242,0.26)';
    x.beginPath();

const tmpObj = new THREE.Object3D();
function localMat(group, lx, ly, lz, rx, ry, rz, sx, sy, sz) {
  tmpObj.position.set(lx, ly, lz);
  tmpObj.rotation.set(rx || 0, ry || 0, rz || 0);
  tmpObj.scale.set(sx || 1, sy || 1, sz || 1);
  tmpObj.updateMatrix();
  const m = new THREE.Matrix4();
  if (group) {
    group.updateMatrix();
    m.multiplyMatrices(group.matrix, tmpObj.matrix);
  } else {
    m.copy(tmpObj.matrix);
  }
  return m;
}
function bake(geo, mat, mats, opts) {
  opts = opts || {};
  if (!mats.length) return null;
  const im = new THREE.InstancedMesh(geo, mat, mats.length);
  for (let i = 0; i < mats.length; i++) {
    if (mats[i].m) {
      im.setMatrixAt(i, mats[i].m);
      im.setColorAt(i, mats[i].c);
    } else {
      im.setMatrixAt(i, mats[i]);
    }
  }
  if (im.instanceColor) im.instanceColor.needsUpdate = true;
  im.castShadow = !!opts.shadow;
  im.receiveShadow = true;
  (opts.parent || scene).add(im);
  return im;
}
function pushCyl(list, p1, p2, r1, r2, radial) {
  const a = new THREE.Vector3(p1[0], p1[1], p1[2]);
  const b = new THREE.Vector3(p2[0], p2[1], p2[2]);
  const dir = b.clone().sub(a);
  const len = dir.length();
  const g = new THREE.CylinderGeometry(r2, r1, len, radial || 7);
  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
  const m = new THREE.Matrix4().compose(
    a.clone().add(b).multiplyScalar(0.5), q, new THREE.Vector3(1, 1, 1));
  g.applyMatrix4(m);
  list.push(g.toNonIndexed());
}
function boxAt(list, w, h, d, x, y, z, ry) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Matrix4().compose(
    new THREE.Vector3(x, y, z),
    new THREE.Quaternion().setFromEuler(new THREE.Euler(0, ry || 0, 0)),
    new THREE.Vector3(1, 1, 1));
  g.applyMatrix4(m);
  list.push(g.toNonIndexed());
}

/* Roof builder, ridge parallel to facade. */
const ROOF_TEX_W = 2.2, ROOF_TEX_H = 3.0;
function makeRoofGeo(w, d, h) {
  const pos = [], uv = [];
  function quad(a, b, c, dd, su, sv) {
    const u1 = su / ROOF_TEX_W, v1 = sv / ROOF_TEX_H;
    pos.push(a[0],a[1],a[2], b[0],b[1],b[2], c[0],c[1],c[2]);
    pos.push(a[0],a[1],a[2], c[0],c[1],c[2], dd[0],dd[1],dd[2]);
    uv.push(0,0, u1,0, u1,v1, 0,0, u1,v1, 0,v1);
  }
  const slope = Math.hypot(d / 2, h);
  quad([-w/2,0,d/2],[w/2,0,d/2],[w/2,h,0],[-w/2,h,0], w, slope);
  quad([w/2,0,-d/2],[-w/2,0,-d/2],[-w/2,h,0],[w/2,h,0], w, slope);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  g.computeVertexNormals();
  return g;
}
function makeRoofEndsGeo(w, d, h) {
  const pos = [], uv = [];
  function tri(a, b, c) {
    pos.push(a[0],a[1],a[2], b[0],b[1],b[2], c[0],c[1],c[2]);
    uv.push(0,0, 1,0, 0.5,1);
  }
  tri([w/2,0,d/2],[w/2,0,-d/2],[w/2,h,0]);
  tri([-w/2,0,-d/2],[-w/2,0,d/2],[-w/2,h,0]);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  g.computeVertexNormals();
  return g;
}

function makeRoundSignTexture(kind) {
  const S = 256, c = makeCanvas(S, S), x = c.getContext('2d');
  x.clearRect(0, 0, S, S);
  const col = kind === 'kafe' ? ['#caa64a', '#2c2018'] : ['#d8c898', '#6b4a26'];
  x.fillStyle = col[0];
  x.beginPath(); x.arc(128, 128, 124, 0, 6.28); x.fill();
  x.fillStyle = col[1];
  x.beginPath(); x.arc(128, 128, 106, 0, 6.28); x.fill();
  x.strokeStyle = col[0]; x.lineWidth = 5;
  x.beginPath(); x.arc(128, 128, 94, 0, 6.28); x.stroke();
  x.strokeStyle = col[0]; x.fillStyle = col[0]; x.lineWidth = 10;
  if (kind === 'kafe') {
    x.fillRect(80, 120, 84, 56);
    x.beginPath(); x.arc(122, 176, 42, 0, Math.PI, false); x.fill();
    x.beginPath(); x.arc(172, 142, 20, -1.4, 1.4, false); x.stroke();
    x.lineWidth = 7;
    for (const sx of [100, 124, 148]) {
      x.beginPath();
      x.moveTo(sx, 104); x.quadraticCurveTo(sx - 10, 88, sx, 72); x.quadraticCurveTo(sx + 10, 58, sx, 44);
      x.stroke();
    }
  } else {
    x.lineWidth = 16;
    x.beginPath(); x.arc(128, 110, 44, Math.PI * 0.75, Math.PI * 0.25, false); x.stroke();
    x.beginPath(); x.moveTo(96, 142); x.quadraticCurveTo(128, 188, 168, 130); x.stroke();
    x.beginPath(); x.moveTo(160, 142); x.quadraticCurveTo(128, 188, 88, 130); x.stroke();
    x.beginPath(); x.moveTo(74, 170); x.quadraticCurveTo(128, 200, 182, 170); x.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  return t;
}

function addBlock(bx, bz, yaw, width, depth, opts) {
  opts = opts || {};
  const floors = opts.floors || (4 + Math.floor(rand() * 2));
  const y0 = -0.12;
  const wallH = GROUND_H + floors * FLOOR_H + 0.45;
  const mat = plasterMats[opts.colorIdx !== undefined ? opts.colorIdx : pickColor()];

  const g = new THREE.Group();
  g.position.set(bx, y0, bz);
  g.rotation.y = yaw;
  g.updateMatrix();
  scene.add(g);

  const walls = new THREE.Mesh(new THREE.BoxGeometry(width, wallH, depth), mat);
  walls.position.y = wallH / 2;
  walls.castShadow = true; walls.receiveShadow = true;
  g.add(walls);

  const fz = depth / 2;

  corniceList.push(localMat(g, 0, wallH - 0.05, fz - 0.02, 0, 0, 0, width + 0.3, 1, 1));
  bandList.push(localMat(g, 0, GROUND_H + 0.1, fz + 0.01, 0, 0, 0, width + 0.1, 1, 1));

  const roofH = rrange(2.2, 3.0);
  const roof = new THREE.Mesh(makeRoofGeo(width + 0.35, depth + 0.7, roofH), roofMat);
  roof.position.y = wallH + 0.05;
  roof.castShadow = true; roof.receiveShadow = true;
  g.add(roof);
  const ends = new THREE.Mesh(makeRoofEndsGeo(width + 0.35, depth + 0.7, roofH), mat);
  ends.position.y = wallH + 0.05;
  g.add(ends);

  if (rand() < 0.55 && !opts.noDormer) {
    const nd = 1 + Math.floor(rand() * 2);
    for (let i = 0; i < nd; i++) {
      const dx = (i - (nd - 1) / 2) * width * 0.3 + rrange(-0.5, 0.5);
      const dg = new THREE.Group();
      dg.position.set(dx, wallH + roofH * 0.36, depth * 0.26);
      const dw = new THREE.Mesh(dormerWallGeo, mat);
      dw.castShadow = true;
      dg.add(dw);
      const dr = new THREE.Mesh(makeRoofGeo(1.25, 1.1, 0.5), roofMat);
      dr.position.y = 0.55;
      dr.castShadow = true;
      dg.add(dr);
      g.add(dg);
      winDarkList.push(localMat(g, dx, wallH + roofH * 0.36, depth * 0.26 + 0.52, 0, 0, 0, 0.62, 0.5, 1));
    }
  }
  const nCh = 1 + Math.floor(rand() * 2);
  for (let i = 0; i < nCh; i++) {
    const cx = (rand() - 0.5) * width * 0.6;
    const ch = new THREE.Mesh(chimneyGeo, chimneyMat);
    ch.position.set(cx, wallH + roofH * 0.8 + 0.3, rrange(-0.6, 0.6));
    ch.castShadow = true;
    g.add(ch);
    const cap = new THREE.Mesh(chimneyCapGeo, chimneyMat);
    cap.position.set(cx, wallH + roofH * 0.8 + 1.02, ch.position.z);
    g.add(cap);
  }
  for (const dxp of [-width / 2 + 0.25, width / 2 - 0.25]) {
    drainList.push(localMat(g, dxp, wallH * 0.5, fz + 0.1, 0, 0, 0, 1, wallH - 0.4, 1));
  }

  /* corner tower: round bay rising past the cornice with a cone cap */
  if (opts.tower !== undefined) {
    const tlx = opts.tower * (width / 2 - 0.4);
    const towerH = wallH + 1.8;
    const tw = new THREE.Mesh(new THREE.CylinderGeometry(2.0, 2.0, towerH, 14), mat);
    tw.position.set(tlx, towerH / 2 + 0.5, fz - 0.4);
    tw.castShadow = true; tw.receiveShadow = true;
    g.add(tw);
    const cone = new THREE.Mesh(new THREE.ConeGeometry(2.25, 2.6, 14), roofMat);
    cone.position.set(tlx, towerH + 1.78, fz - 0.4);
    cone.castShadow = true;
    g.add(cone);
    const finial = new THREE.Mesh(new THREE.SphereGeometry(0.14, 8, 6), ironMat);
    finial.position.set(tlx, towerH + 3.12, fz - 0.4);
    g.add(finial);
    corniceList.push(localMat(g, tlx, towerH + 0.35, fz - 0.4, 0, 0, 0, 4.3, 0.8, 0.34 / 0.32));
    // tower windows wrap the curve
    for (let f = 0; f < floors; f++) {
      const wy = GROUND_H + 1.35 + f * FLOOR_H;
      for (const ang of [-0.55, 0, 0.55]) {
        const wxp = tlx + Math.sin(ang) * 2.02;
        const wzp = fz - 0.4 + Math.cos(ang) * 2.02;
        const m = localMat(g, wxp, wy, wzp, 0, ang, 0, 0.78, 0.92, 1);
        if (rand() < 0.08) winLitList.push(m); else winDarkList.push(m);
      }
    }
  }

  /* bay window stack (burspråk) on some facades */
  let bayLx = null;
  if (opts.bay || (opts.bay === undefined && rand() < 0.3 && width > 12)) {
    bayLx = (rand() - 0.5) * width * 0.4;
    const bayH = floors * FLOOR_H - 0.4;
    const bw = new THREE.Mesh(new THREE.BoxGeometry(2.4, bayH, 0.85), mat);
    bw.position.set(bayLx, GROUND_H + bayH / 2 + 0.3, fz + 0.42);
    bw.castShadow = true; bw.receiveShadow = true;
    g.add(bw);
    corniceList.push(localMat(g, bayLx, GROUND_H + 0.28, fz + 0.5, 0, 0, 0, 2.6, 0.7, 1.2));
    corniceList.push(localMat(g, bayLx, GROUND_H + bayH + 0.32, fz + 0.5, 0, 0, 0, 2.6, 0.7, 1.2));
    for (let f = 0; f < floors; f++) {
      const wy = GROUND_H + 1.35 + f * FLOOR_H;
      const m = localMat(g, bayLx, wy, fz + 0.87, 0, 0, 0, 1.35, 1, 1);
      if (rand() < 0.07) winLitList.push(m); else winDarkList.push(m);
    }
  }

  /* upper-floor window grid + balconies */
  const nBays = Math.max(2, Math.floor((width - 1.2) / 1.95));
  const bayW = width / nBays;
  const balconyBay = rand() < 0.5 ? Math.floor(rand() * nBays) : -1;
  for (let f = 0; f < floors; f++) {
    const wy = GROUND_H + 1.35 + f * FLOOR_H;
    for (let k = 0; k < nBays; k++) {
      if (rand() < 0.04) continue;
      const lx = (k + 0.5) * bayW - width / 2;
      if (bayLx !== null && Math.abs(lx - bayLx) < 1.8) continue;
      if (opts.tower !== undefined && Math.abs(lx - opts.tower * (width / 2 - 0.4)) < 2.4) continue;
      const m = localMat(g, lx, wy, fz + 0.02, 0, 0, 0, 1, 1, 1);
      if (rand() < 0.06) winLitList.push(m); else winDarkList.push(m);
      if (k === balconyBay && f >= 1 && f < floors - 1 && rand() < 0.7) {
        balconyList.push(localMat(g, lx, wy - 0.95, fz + 0.02, 0, 0, 0, 1, 1, 1));
      }
    }
  }

  /* ground floor: shopfronts + an ornamented entry porte */
  if (!opts.noShops) {
    const units = [];
    let remaining = width - 0.6;
    let cursor = -width / 2 + 0.3;
    const doorUnit = 1 + Math.floor(rand() * 2);
    let ui = 0;
    while (remaining > 2.2) {
      let uw;
      if (ui === doorUnit) uw = 1.8;
      else uw = Math.min(remaining, rrange(3.8, 5.4));
      if (remaining - uw < 1.6 && remaining - uw > 0.01) uw = remaining;
      units.push({ x: cursor + uw / 2, w: uw, door: ui === doorUnit });
      cursor += uw; remaining -= uw; ui++;
    }
    let su = 0;
    for (const u of units) {
      if (u.door) {
        const porte = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 2.95), porteMat);
        porte.position.set(u.x, 0.35 + 1.5, fz + 0.03);
        g.add(porte);
        // ornamented surround: pilasters + entablature
        const pilL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 3.3, 0.22), corniceMat);
        pilL.position.set(u.x - 1.05, 2.0, fz + 0.08);
        pilL.castShadow = true;
        g.add(pilL);
        const pilR = pilL.clone();
        pilR.position.x = u.x + 1.05;
        g.add(pilR);
        const lintel = new THREE.Mesh(new THREE.BoxGeometry(2.7, 0.45, 0.3), corniceMat);
        lintel.position.set(u.x, 3.85, fz + 0.08);
        lintel.castShadow = true;
        g.add(lintel);
        const step = new THREE.Mesh(stepGeo, graniteStepMat);
        step.position.set(u.x, 0.42, fz + 0.25);
        step.castShadow = true; step.receiveShadow = true;
        g.add(step);
      } else {
        const shopIdx = (opts.shops && su < opts.shops.length) ? opts.shops[su] : (shopCounter % shopfrontMats.length);
        su++; shopCounter++;
        const sm = shopfrontMats[shopIdx % shopfrontMats.length];
        const shop = new THREE.Mesh(new THREE.PlaneGeometry(u.w - 0.15, 3.65), sm);
        shop.position.set(u.x, 0.35 + 1.85, fz + 0.025);
        g.add(shop);
        // record world position so terraces / crates / buckets line up
        const wp = new THREE.Vector3(u.x, 0, fz).applyMatrix4(g.matrix);
        shopUnits.push({ idx: shopIdx % SHOPS.length, x: wp.x, z: wp.z, w: u.w });
        const kind = SHOPS[shopIdx % SHOPS.length].kind;
        if (kind === 'cafe' || kind === 'bakery' || rand() < 0.35) addAwning(g, u.x, u.w - 0.6, fz);
        if (kind === 'cafe' || kind === 'bakery') {
          const sign = makeShopSign(kind === 'cafe' ? 0 : 1);
          sign.position.set(u.x + u.w * 0.35, 3.55, fz);
          g.add(sign);
        }
      }
    }
  }
  return g;
}

// curated shop runs so café / grocery / florist land where their

const SHOP_RUNS = {};
SHOP_RUNS.eastCafe = [0, 6];      // café near ride start, east side

for (const side of [1, -1]) {
  for (const seg of [[148, 14.5], [-14.5, -148]]) {
    let z = seg[0];
    while (z - 7 > seg[1]) {
      let w = rrange(11, 16);
      if (z - w < seg[1] + 7) w = z - seg[1];
      const zc = z - w / 2;
      const depth = 10;
      const xc = side * (FACADE_X + depth / 2);
      const yaw = side > 0 ? -Math.PI / 2 : Math.PI / 2;
      const opts = {};
      // towers on the four intersection corners
      if (seg[0] > 0 && z - w < seg[1] + 7.5) opts.tower = side > 0 ? -1 : 1;
      if (seg[0] < 0 && z === seg[0]) opts.tower = side > 0 ? 1 : -1;
      // curated shop runs
      if (side > 0 && seg[0] > 0 && zc < 112 && zc > 92 && !SHOP_RUNS.cafeDone) {
        opts.shops = SHOP_RUNS.eastCafe; SHOP_RUNS.cafeDone = true;
      }
      if (side < 0 && seg[0] > 0 && zc < 60 && zc > 36 && !SHOP_RUNS.groceryDone) {
        opts.shops = SHOP_RUNS.westGrocery; SHOP_RUNS.groceryDone = true;
      }
      if (side > 0 && seg[0] < 0 && zc < -52 && zc > -78 && !SHOP_RUNS.floristDone) {
        opts.shops = SHOP_RUNS.eastFlorist; SHOP_RUNS.floristDone = true;
      }
      if (side < 0 && seg[0] > 0 && zc < 132 && zc > 110 && !SHOP_RUNS.bakeryDone) {
        opts.shops = SHOP_RUNS.westBakery; SHOP_RUNS.bakeryDone = true;
      }
      addBlock(xc, zc, yaw, w, depth, opts);
      z -= w - 0.02;
    }
  }
}

const trunkList = [], limbList = [], pitList = [];

const TREE_GREENS = [0x5d8c3a, 0x6f9c45, 0x4f7d33, 0x79a64e];
function addLinden(tx, tz, big, baseY) {
  const gy = baseY === undefined ? Y_ROAD + 0.1 : baseY;
  const h = big ? rrange(3.4, 4.0) : rrange(2.8, 3.3);
  trunkList.push(localMat(null, tx, gy + h / 2, tz, 0, rand() * 3, 0, 1, h / 3.2, 1));
  pitList.push(localMat(null, tx, gy + 0.015, tz, 0, 0, 0, 1, 1, 1));
  const crownY = gy + h;
  for (let i = 0; i < 4; i++) {
    const ang = i * 1.57 + rand() * 0.8;
    limbList.push(localMat(null,
      tx + Math.cos(ang) * 0.45, crownY + 0.55, tz + Math.sin(ang) * 0.45,
      Math.cos(ang) * 0.75, 0, Math.sin(ang) * 0.75, 1, 1, 1));
  }
  const R = big ? 1.75 : 1.4;
  const blobs = [[0, 1.2, 0], [1.0, 0.8, 0.4], [-0.95, 0.85, -0.35], [0.15, 0.75, 1.05], [-0.2, 0.9, -1.0]];
  for (const b of blobs) {
    for (let i = 0; i < 50; i++) {
      const th = rand() * Math.PI * 2, ph = Math.acos(2 * rand() - 1);
      const rr = R * 0.82 * Math.cbrt(rand());
      const lx = tx + b[0] + rr * Math.sin(ph) * Math.cos(th);
      const ly = crownY + b[1] + rr * Math.cos(ph) * 0.85;
      const lz = tz + b[2] + rr * Math.sin(ph) * Math.sin(th);
      leafList.push({
        m: localMat(null, lx, ly, lz, rand() * 3.1, rand() * 3.1, rand() * 3.1,
          rrange(2.4, 3.6), rrange(2.4, 3.6), 1),
        c: new THREE.Color(TREE_GREENS[Math.floor(rand() * TREE_GREENS.length)])
      });
    }
  }
  obstacles.push({ x: tx, z: tz, r: 0.55 });
}

const walkerGrp = new THREE.Object3D();
function updateWalkers(dt) {
  for (let i = 0; i < NW; i++) {
    const w = walkers[i];
    const p = w.axis === 'z' ? w.z : w.x;
    let np = p + w.dir * w.speed * dt;
    if (np > w.max) { np = w.max; w.dir = -1; }
    if (np < w.min) { np = w.min; w.dir = 1; }
    if (w.axis === 'z') w.z = np; else w.x = np;
    w.phase += w.speed * dt * 3.4;
    const yawP = w.axis === 'z' ? (w.dir > 0 ? 0 : Math.PI) : (w.dir > 0 ? Math.PI / 2 : -Math.PI / 2);
    const sc = w.sc;
    const bobY = 0.02 * Math.abs(Math.sin(w.phase));
    walkerGrp.position.set(w.x, w.y + bobY, w.z);
    walkerGrp.rotation.set(0, yawP, 0);
    walkerGrp.updateMatrix();
    wTorso.setMatrixAt(i, localMat(walkerGrp, 0, 1.16 * sc, 0, 0, 0, 0, sc, sc, sc));
    wHead.setMatrixAt(i, localMat(walkerGrp, 0, 1.585 * sc, 0.01, 0, 0, 0, sc, sc, sc));
    wHair.setMatrixAt(i, localMat(walkerGrp, 0, 1.63 * sc, -0.005, 0, 0, 0, sc, 0.72 * sc, sc));
    for (let s = 0; s < 2; s++) {
      const sgn = s === 0 ? -1 : 1;
      const th = 0.5 * Math.sin(w.phase + sgn * Math.PI / 2);
      wLeg.setMatrixAt(i * 2 + s, localMat(walkerGrp,
        sgn * 0.085, (0.85 - 0.425 * Math.cos(th)) * sc, 0.425 * Math.sin(th) * sc, th, 0, 0, sc, sc, sc));
      const ath = -th * 0.8;
      wArm.setMatrixAt(i * 2 + s, localMat(walkerGrp,
        sgn * 0.21, (1.36 - 0.3 * Math.cos(ath)) * sc, 0.3 * Math.sin(ath) * sc, ath, 0, sgn * 0.1, sc, sc, sc));
    }
  }
  for (const im of [wHead, wHair, wTorso, wLeg, wArm]) im.instanceMatrix.needsUpdate = true;
}

   Signalized intersection. Swedish phase chain with red+amber
   before green. The ride controller can request a red phase so
   the scripted stop always meets a red light.
   ============================================================ */
const PHASES = [
  { n: 'MG', d: 13.0 },   // main green
  { n: 'MA', d: 2.2 },    // main amber
  { n: 'AR1', d: 1.0 },   // all red
  { n: 'CG', d: 8.0 },    // cross green
  { n: 'CA', d: 1.2 },    // cross amber
  { n: 'AR2', d: 0.6 },   // all red
  { n: 'MRA', d: 0.9 }    // main red+amber
];
const signal = { idx: 0, t: 5.0, forceRequest: false, cyclistWaiting: false };
function signalPhase() { return PHASES[signal.idx].n; }
function mainState() {

  for (const sx of [-0.18, 0.18]) {
    const lever = new THREE.Mesh(new THREE.BoxGeometry(0.018, 0.018, 0.12), alu);
    lever.position.set(sx, -0.41, -0.54);
    lever.rotation.x = 0.5;
    rig.add(lever);
  }
  // bell
  const bell = new THREE.Mesh(new THREE.SphereGeometry(0.026, 10, 8), alu);
  bell.position.set(-0.11, -0.365, -0.47);
  rig.add(bell);
  // stem + head tube down to the fork crown
  const stemGeo = new THREE.CylinderGeometry(0.017, 0.017, 0.16, 8);
  const stem = new THREE.Mesh(stemGeo, alu);
  stem.position.set(0, -0.46, -0.48);
  rig.add(stem);
  const headTube = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.022, 0.4, 8), frameCol);
  headTube.position.set(0, -0.66, -0.51);
  headTube.rotation.x = 0.15;
  rig.add(headTube);
  // fork blades raked forward to the hub
  for (const sx of [-0.05, 0.05]) {
    const blade = new THREE.Mesh(new THREE.CylinderGeometry(0.011, 0.014, 0.72, 7), frameCol);
    blade.position.set(sx, -1.02, -0.86);
    blade.rotation.x = 1.1;
    rig.add(blade);
  }
  // spinning front wheel, pushed forward so its top arc is in frame
  const wheelGrp = new THREE.Group();
  wheelGrp.position.set(0, -1.18, -1.18);
  rig.add(wheelGrp);
  const tyreGeo = new THREE.TorusGeometry(0.34, 0.032, 10, 22);
  tyreGeo.rotateY(Math.PI / 2);
  const tyre = new THREE.Mesh(tyreGeo, black);
  wheelGrp.add(tyre);
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.07, 10), alu);
  hub.rotation.z = Math.PI / 2;
  wheelGrp.add(hub);
  // a few spokes + valve so the spin reads
  const spokeGeo = new THREE.CylinderGeometry(0.0035, 0.0035, 0.62, 4);
  for (let i = 0; i < 4; i++) {
    const sp = new THREE.Mesh(spokeGeo, alu);
    sp.rotation.x = i * Math.PI / 4;
    wheelGrp.add(sp);
  }
  const valve = new THREE.Mesh(new THREE.BoxGeometry(0.012, 0.05, 0.012), alu);
  valve.position.set(0, -0.3, 0);
  wheelGrp.add(valve);
  // front fender
  const fenderGeo = new THREE.CylinderGeometry(0.385, 0.385, 0.07, 16, 1, true, -0.5, 1.6);
  fenderGeo.rotateZ(Math.PI / 2);
  fenderGeo.rotateX(-Math.PI / 2);
  const fender = new THREE.Mesh(fenderGeo, new THREE.MeshStandardMaterial({
    color: 0x7a2828, roughness: 0.4, metalness: 0.6, side: THREE.DoubleSide
  }));
  fender.position.copy(wheelGrp.position);
  rig.add(fender);
  rig.userData.wheel = wheelGrp;
}

/* ============================================================
   The ride spline + speed controller
   ============================================================ */
const ridePath = new THREE.CatmullRomCurve3([
  new THREE.Vector3(3.0, 0.13, 192),
  new THREE.Vector3(4.6, 0.13, 182),
  new THREE.Vector3(6.6, 0.13, 170),
  new THREE.Vector3(8.0, 0.10, 158),
  new THREE.Vector3(8.7, 0.045, 148),
  new THREE.Vector3(8.8, 0.045, 128),
  new THREE.Vector3(8.55, 0.045, 108),
  new THREE.Vector3(8.9, 0.045, 86),
  new THREE.Vector3(8.6, 0.045, 64),
  new THREE.Vector3(8.85, 0.045, 42),
  new THREE.Vector3(8.6, 0.045, 24),
  new THREE.Vector3(8.7, 0.045, 10),
  new THREE.Vector3(8.75, 0.045, -8),
  new THREE.Vector3(8.6, 0.045, -30),
  new THREE.Vector3(8.85, 0.045, -52),
  new THREE.Vector3(8.6, 0.045, -76),
  new THREE.Vector3(8.8, 0.045, -98),
  new THREE.Vector3(8.6, 0.045, -116),
  new THREE.Vector3(8.2, 0.045, -128),
  new THREE.Vector3(7.2, 0.06, -136),
  new THREE.Vector3(5.2, 0.09, -142),
  new THREE.Vector3(2.4, 0.12, -146),
  new THREE.Vector3(0.6, 0.13, -149.2)   // final heading aims at the rotunda
], false, 'centripetal');
const RIDE_LEN = ridePath.getLength();
// arc-length position of the cyclist stop bar (z = 12.2) and ride end
let S_STOP = RIDE_LEN * 0.5, S_END = RIDE_LEN - 0.45;
{
  const NSAMP = 2400;
  let acc = 0, prev = ridePath.getPointAt(0), found = false;
  for (let i = 1; i <= NSAMP; i++) {
    const p = ridePath.getPointAt(i / NSAMP);
    acc += p.distanceTo(prev);
    if (!found && p.z <= 12.2) { S_STOP = acc; found = true; }
    prev = p;
  }
}
const CRUISE = 5.35;     // ~19 km/h
const ride = { s: 0, v: 0, state: 'ride', waitT: 0, stopDone: false, cad: 0, roll: 0 };
const lightNoteEl = document.getElementById('lightNote');
const restartBtnEl = document.getElementById('restartBtn');
function resetRide() {
  ride.s = 0; ride.v = 0; ride.state = 'ride'; ride.waitT = 0;
  ride.stopDone = false; ride.cad = 0; ride.roll = 0;
  signal.idx = 0; signal.t = 5.0;
  signal.forceRequest = false; signal.cyclistWaiting = false;
  applySignalVisuals();
  lightNoteEl.style.display = 'none';
  restartBtnEl.classList.remove('glow');
  resetBus();
}
const _pA = new THREE.Vector3(), _pB = new THREE.Vector3(), _look = new THREE.Vector3();
function updateRide(dt) {
  if (ride.state === 'waiting') {
    ride.waitT += dt;
    signal.cyclistWaiting = ride.waitT > 1.3;   // a beat at rest before the chain releases
    if (mainState() === 'green' && ride.waitT > 0.55) {
      ride.state = 'ride';
      ride.stopDone = true;
      signal.cyclistWaiting = false;
      signal.forceRequest = false;
      lightNoteEl.style.display = 'none';
    }
  }
  if (ride.state === 'ride') {
    let vT = CRUISE;
    if (!ride.stopDone) {
      const dist = S_STOP - ride.s;
      if (dist < 38 && dist > 0) signal.forceRequest = true;
      if (dist > 0 && dist < 16 && mainState() !== 'green') {
        vT = Math.min(vT, CRUISE * Math.pow(clamp01(dist / 16), 0.85));
      }
      if (dist <= 0.35) {
        if (mainState() !== 'green') {
          ride.v = 0;
          ride.state = 'waiting';
          ride.waitT = 0;
          lightNoteEl.style.display = 'block';
        } else {
          ride.stopDone = true;
          signal.forceRequest = false;
        }
      }
    }
    const dEnd = S_END - ride.s;
    if (dEnd < 14) vT = Math.min(vT, CRUISE * Math.pow(clamp01(dEnd / 14), 0.9));
    if (dEnd <= 0.3) {
      ride.v = 0;
      ride.state = 'finished';
      restartBtnEl.classList.add('glow');
    }
    if (vT > ride.v) ride.v = Math.min(vT, ride.v + 1.7 * dt);
    else ride.v = Math.max(vT, ride.v - 3.6 * dt);
    ride.s = Math.min(S_END, ride.s + ride.v * dt);
    ride.cad += ride.v * dt * 1.85;
  }
  /* camera pose along the spline */
  const u = clamp01(ride.s / RIDE_LEN);
  ridePath.getPointAt(u, _pA);
  const u2 = clamp01((ride.s + 2.0) / RIDE_LEN);
  const t1 = ridePath.getTangentAt(u);
  const t2 = ridePath.getTangentAt(u2);
  _pB.copy(_pA).addScaledVector(t1, 4.0);   // look along the tangent, never degenerate at the end
  const a1 = Math.atan2(t1.x, t1.z), a2 = Math.atan2(t2.x, t2.z);
  let dyaw = a2 - a1;
  while (dyaw > Math.PI) dyaw -= Math.PI * 2;
  while (dyaw < -Math.PI) dyaw += Math.PI * 2;
  const curvature = dyaw / 2.0;
  const speedFac = Math.min(1, ride.v / 4);
  const lean = clampv(ride.v * ride.v * curvature / 9.81, -0.3, 0.3);
  const sway = 0.045 * Math.sin(ride.cad) * speedFac;
  const targetRoll = lean * 0.85 + sway + (ride.state === 'waiting' ? 0.035 : 0);
  ride.roll += (targetRoll - ride.roll) * Math.min(1, dt * 6);
  const bob = 0.018 * Math.sin(ride.cad * 2) * speedFac
            + (ride.state === 'waiting' ? 0.006 * Math.sin(performance.now() * 0.002) : 0);
  camera.position.set(_pA.x, _pA.y + EYE_RIDE + bob, _pA.z);
  // slight rider's down-pitch, easing into an upward gaze at the rotunda over the last metres
  const gazeUp = 1.7 * smooth01(clamp01((9 - (S_END - ride.s)) / 9));
  _look.set(_pB.x, _pA.y + EYE_RIDE - 0.34 + gazeUp + bob * 0.5, _pB.z);
  camera.lookAt(_look);
  camera.rotateZ(ride.roll);
  camera.rotateY(0.012 * Math.sin(ride.cad) * speedFac);
  /* rig response */
  rig.visible = true;
  rig.rotation.z = -ride.roll * 0.45;
  rig.rotation.y = clampv(curvature * 2.2, -0.18, 0.18) + 0.03 * Math.sin(ride.cad) * speedFac;
  rig.userData.wheel.rotation.x -= ride.v * dt / 0.34;
}

/* ============================================================
   Free roam — pointer lock + WASD inside human bounds
   ============================================================ */
const roam = { yaw: Math.PI, pitch: 0, h: EYE_WALK, locked: false };
const keys = {};
window.addEventListener('keydown', function (e) {
  keys[e.code] = true;
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].indexOf(e.code) >= 0) e.preventDefault();
  if (e.code === 'KeyC' && !e.repeat) setMode(MODE === 'ride' ? 'roam' : 'ride');
});
window.addEventListener('keyup', function (e) { keys[e.code] = false; });
const crossEl = document.getElementById('cross');
renderer.domElement.addEventListener('click', function () {
  if (MODE === 'roam' && !roam.locked) renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', function () {
  roam.locked = document.pointerLockElement === renderer.domElement;
  crossEl.style.display = (roam.locked && MODE === 'roam') ? 'block' : 'none';
});
document.addEventListener('mousemove', function (e) {
  if (!roam.locked || MODE !== 'roam') return;
  roam.yaw -= e.movementX * 0.0023;
  roam.pitch = clampv(roam.pitch - e.movementY * 0.0021, -1.35, 1.35);
});
function groundHeight(x, z) {
  if (z > 150) return Y_SQUARE;
  if (z < -148) {
    const onStepsX = x > -18.5 && x < -1.5;
    if (z >= -160.2) return 0.05;                       // crossing Sveavägen
    if (z >= -166.2) {                                  // the library steps
      if (!onStepsX) return 0.05;
      const t = clamp01((-z - 160.2) / 5.8);
      return 0.05 + (LIB.terrTop - 0.05) * t;
    }
    return LIB.terrTop;                                 // up on the terrace
  }
  const ax = Math.abs(x);
  if (ax > 10.15) return Y_WALKWAY;
  if (ax > 7.85) return Y_CYCLE;
  if (ax < 1.78 && ((z > 18 && z < 140) || (z < -18 && z > -140))) return Y_ROAD + 0.1;
  return Y_ROAD;
}
function updateRoam(dt) {
  rig.visible = false;
  const fwd = new THREE.Vector3(-Math.sin(roam.yaw), 0, -Math.cos(roam.yaw));
  const right = new THREE.Vector3(-fwd.z, 0, fwd.x);
  const move = new THREE.Vector3();
  if (keys.KeyW || keys.ArrowUp) move.add(fwd);
  if (keys.KeyS || keys.ArrowDown) move.sub(fwd);
  if (keys.KeyD || keys.ArrowRight) move.add(right);
  if (keys.KeyA || keys.ArrowLeft) move.sub(right);
  if (move.lengthSq() > 0) {
    const speed = (keys.ShiftLeft || keys.ShiftRight) ? 6.2 : 3.1;
    move.normalize().multiplyScalar(speed * dt);
    camera.position.add(move);
  }
  let px = camera.position.x, pz = camera.position.z;
  /* region bounds */
  if (pz > 150) {                          // the square
    pz = Math.min(202, pz);
    px = clampv(px, -43, 45);
  } else if (pz < -148) {                  // Sveavägen + library terrace
    const onSteps = px > -18.5 && px < -1.5;
    pz = Math.max(onSteps ? -174 : -165.8, pz);
    px = clampv(px, -25, 12);
    if (pz < -166 && !onSteps) pz = -165.8;
  } else {                                 // the street canyon
    px = clampv(px, -13.5, 13.5);
  }
  /* push out of obstacles */
  for (const ob of obstacles) {
    const dx = px - ob.x, dz = pz - ob.z;
    const d2 = dx * dx + dz * dz;
    if (d2 < ob.r * ob.r && d2 > 1e-6) {
      const d = Math.sqrt(d2);
      px = ob.x + dx / d * ob.r;
      pz = ob.z + dz / d * ob.r;
    }
  }
  camera.position.x = px;
  camera.position.z = pz;
  const wantH = groundHeight(px, pz) + EYE_WALK;
  roam.h += (wantH - roam.h) * Math.min(1, dt * 7);
  camera.position.y = roam.h;
  camera.quaternion.setFromEuler(new THREE.Euler(roam.pitch, roam.yaw, 0, 'YXZ'));
}

/* ============================================================
   Mode switching + UI wiring
   ============================================================ */
let MODE = 'ride';
const modeBtnEl = document.getElementById('modeBtn');
const spdValEl = document.getElementById('spdVal');
function setMode(m) {
  MODE = m;
  if (m === 'roam') {
    modeBtnEl.innerHTML = '&#128694; MODE: FREE ROAM';
    modeBtnEl.classList.add('roam');
    signal.forceRequest = false;        // don't deadlock traffic while the ride is paused
    signal.cyclistWaiting = false;
    // take over from wherever the camera is, at eye level
    roam.yaw = Math.atan2(-camera.getWorldDirection(_look).x, -_look.z) + Math.PI;
    const e = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
    roam.yaw = e.y; roam.pitch = e.x;
    roam.h = groundHeight(camera.position.x, camera.position.z) + EYE_WALK;
  } else {
    modeBtnEl.innerHTML = '&#127881; MODE: CYCLIST RIDE';
    modeBtnEl.classList.remove('roam');
    if (document.pointerLockElement) document.exitPointerLock();
    crossEl.style.display = 'none';
  }
}
modeBtnEl.addEventListener('click', function () { setMode(MODE === 'ride' ? 'roam' : 'ride'); });
restartBtnEl.addEventListener('click', function () {
  resetRide();
  if (MODE !== 'ride') setMode('ride');
});

/* ============================================================
   Resize + main loop
   ============================================================ */
window.addEventListener('resize', function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
const clock = new THREE.Clock();
let elapsed = 0;
let lastCamPos = new THREE.Vector3();
/* adaptive resolution: hold 60ish fps on any GPU */
const DPR_MAX = Math.min(window.devicePixelRatio, 1.5);
let dprLevel = DPR_MAX, perfFrames = 0, perfTime = 0, perfWarm = false;
function adaptQuality(dt) {
  if (window.__recLock) return;   // hold resolution steady while capturing video
  perfFrames++; perfTime += dt;
  if (perfTime < 2.5 || perfFrames < 30) return;
  const f = perfFrames / perfTime;
  if (!perfWarm) { perfWarm = true; }                  // skip the shader-warmup window
  else if (f < 48 && dprLevel > 1.0) {
    dprLevel = Math.max(1.0, dprLevel - 0.25);
    renderer.setPixelRatio(dprLevel);
  } else if (f > 57 && dprLevel < DPR_MAX) {
    dprLevel = Math.min(DPR_MAX, dprLevel + 0.25);
    renderer.setPixelRatio(dprLevel);
  }
  perfFrames = 0; perfTime = 0;
}
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;
  updateSignal(dt);
  updateCars(dt);
  updateBus(dt);
  updateOncoming(dt, elapsed);
  updateWalkers(dt);
  for (const S of swingSigns) {
    S.g.rotation.z = 0.06 * Math.sin(elapsed * 1.2 + S.phase);
  }
  if (MODE === 'ride') updateRide(dt);
  else updateRoam(dt);
  /* speed readout */
  let kmh;
  if (MODE === 'ride') kmh = ride.v * 3.6;
  else kmh = lastCamPos.distanceTo(camera.position) / Math.max(dt, 1e-4) * 3.6;
  lastCamPos.copy(camera.position);
  spdValEl.textContent = String(Math.round(Math.min(kmh, 99)));
  /* shadow frustum + sky follow the camera down the street */
  sun.position.set(SUN_OFFSET.x, SUN_OFFSET.y, camera.position.z + SUN_OFFSET.z);
  sun.target.position.set(0, 0, camera.position.z);
  skyDome.position.z = camera.position.z * 0.85;
  adaptQuality(dt);
  renderer.render(scene, camera);
}
updateRide(0);
animate();

/* debug / capture hooks */
window.__odengatan = {
  scene: scene, camera: camera, renderer: renderer, ride: ride, signal: signal,
  setMode: setMode, resetRide: resetRide,
  jumpTo: function (s) { ride.s = clampv(s, 0, S_END); ride.v = CRUISE; updateRide(0); },
  rideLen: RIDE_LEN, sStop: S_STOP, sEnd: S_END,
  phase: signalPhase, mainState: mainState
};
</script>
</body>
