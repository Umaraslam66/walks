<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';

/* ============================================================
   Deterministic random + value noise — every texture and every
   placement derives from these, so the street is stable.
   ============================================================ */
function mulberry32(a) {
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rand = mulberry32(20260612);
function rrange(a, b) { return a + (b - a) * rand(); }
function clamp01(v) { return Math.min(1, Math.max(0, v)); }
function smooth01(t) { t = clamp01(t); return t * t * (3 - 2 * t); }

function makeValueNoise(seed) {
  const r = mulberry32(seed);
  const N = 128;
  const grid = new Float32Array(N * N);
  for (let i = 0; i < N * N; i++) grid[i] = r();
  return function (x, y) {
    x = ((x % N) + N) % N; y = ((y % N) + N) % N;
    const xi = Math.floor(x), yi = Math.floor(y);
    const xf = x - xi, yf = y - yi;
    const x2 = (xi + 1) % N, y2 = (yi + 1) % N;
    const sx = xf * xf * (3 - 2 * xf), sy = yf * yf * (3 - 2 * yf);
    const a = grid[yi * N + xi], b = grid[yi * N + x2];
    const c = grid[y2 * N + xi], d = grid[y2 * N + x2];
    return a + (b - a) * sx + (c - a) * sy + (a - b - c + d) * sx * sy;
  };
}
function fbm(noise, x, y, oct) {
  let amp = 1, f = 1, sum = 0, norm = 0;
  for (let i = 0; i < oct; i++) {
    sum += amp * noise(x * f, y * f);
    norm += amp; amp *= 0.5; f *= 2.03;
  }
  return sum / norm;
}
function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return c;
}
function asTexture(canvas, srgb, repX, repY) {
  const t = new THREE.CanvasTexture(canvas);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(repX || 1, repY || 1);
  if (srgb) t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  return t;
}

/* ============================================================
   Procedural textures
   ============================================================ */

/* --- Weathered plaster for early-1900s facades: near-white base
       tinted per building via material.color, subtle staining. */
function makePlasterSet(seedBase) {
  const S = 512;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  const idC = xc.createImageData(S, S), idB = xb.createImageData(S, S);
  const n1 = makeValueNoise(seedBase + 1);
  const n2 = makeValueNoise(seedBase + 2);
  const n3 = makeValueNoise(seedBase + 3);
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      const u = x / S * 9, v = y / S * 22;
      const base = 0.86 + 0.14 * fbm(n1, u, v, 5);
      const blotch = fbm(n2, x / S * 3.6, y / S * 3.6, 4);
      let shade = base * (1.0 - 0.13 * Math.max(0, blotch - 0.55) * 2.2);
      const streak = fbm(n3, x / S * 22, y / S * 2.2, 3);
      const topW = 0.3 + 0.7 * (1 - y / S);
      shade *= 1.0 - 0.16 * Math.max(0, streak - 0.58) * 2.6 * topW;
      shade = Math.min(1, Math.max(0.35, shade));
      const r = shade * 255, g = shade * 251, b = shade * 243;
      const i4 = (y * S + x) * 4;
      idC.data[i4] = r; idC.data[i4 + 1] = g; idC.data[i4 + 2] = b; idC.data[i4 + 3] = 255;
      const bump = 0.5 + 0.5 * fbm(n1, u * 2.2, v * 1.0, 5) - 0.2 * Math.max(0, blotch - 0.5);
      const bb = clamp01(bump) * 255;
      idB.data[i4] = bb; idB.data[i4 + 1] = bb; idB.data[i4 + 2] = bb; idB.data[i4 + 3] = 255;
    }
  }
  xc.putImageData(idC, 0, 0);
  xb.putImageData(idB, 0, 0);
  return {
    map: asTexture(cCol, true, 3, 1),
    bump: asTexture(cBmp, false, 3, 1)
  };
}

/* --- Standing-seam tin roof (falsad plåt), grey-green zinc. */
function makeTinRoofSet() {
  const S = 512;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  const n1 = makeValueNoise(4001);
  xc.fillStyle = '#5c665f'; xc.fillRect(0, 0, S, S);
  xb.fillStyle = '#808080'; xb.fillRect(0, 0, S, S);
  // panel weathering blotches
  for (let i = 0; i < 900; i++) {
    const x = rand() * S, y = rand() * S;
    const v = fbm(n1, x * 0.02, y * 0.02, 3);
    xc.fillStyle = 'rgba(' + (70 + v * 40 | 0) + ',' + (80 + v * 40 | 0) + ',' + (74 + v * 36 | 0) + ',0.28)';
    xc.fillRect(x, y, rrange(6, 26), rrange(3, 9));
  }
  // rust runs from seams
  for (let i = 0; i < 26; i++) {
    const x = Math.floor(rand() * 16) * 32 + rrange(-2, 2);
    xc.fillStyle = 'rgba(96,72,52,' + rrange(0.06, 0.16) + ')';
    xc.fillRect(x, rand() * S * 0.5, rrange(2, 5), rrange(40, 180));
  }
  // vertical standing seams every 32 px
  for (let x = 0; x < S; x += 32) {
    xc.fillStyle = 'rgba(255,255,255,0.13)'; xc.fillRect(x, 0, 2, S);
    xc.fillStyle = 'rgba(10,14,12,0.35)'; xc.fillRect(x + 2, 0, 2, S);
    xb.fillStyle = '#ffffff'; xb.fillRect(x, 0, 3, S);
    xb.fillStyle = '#3a3a3a'; xb.fillRect(x + 3, 0, 2, S);
  }
  // faint horizontal panel joints
  for (let y = 0; y < S; y += 128) {
    xc.fillStyle = 'rgba(20,26,22,0.22)'; xc.fillRect(0, y, S, 2);
    xb.fillStyle = '#5a5a5a'; xb.fillRect(0, y, S, 2);
  }
  return { map: asTexture(cCol, true, 2, 1), bump: asTexture(cBmp, false, 2, 1) };
}

/* --- Asphalt: fine grain, wheel-path polish, patch repairs.
       One tile spans the full carriageway width (u across x). */
function makeAsphaltSet() {
  const S = 512;
  const cCol = makeCanvas(S, S), cRgh = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xr = cRgh.getContext('2d');
  const idC = xc.createImageData(S, S), idR = xr.createImageData(S, S);
  const n1 = makeValueNoise(5001), n2 = makeValueNoise(5002);
  for (let y = 0; y < S; y++) {
    for (let x = 0; x < S; x++) {
      const u = x / S;
      let v = 0.44 + 0.12 * fbm(n1, x * 0.07, y * 0.07, 4);
      // grain speckle
      const sp = n2(x * 1.3, y * 1.3);
      if (sp > 0.86) v += 0.10;
      if (sp < 0.10) v -= 0.07;
      // darker wheel paths in each lane
      const wp = Math.exp(-Math.pow((u - 0.20) / 0.05, 2)) + Math.exp(-Math.pow((u - 0.36) / 0.05, 2)) +
                 Math.exp(-Math.pow((u - 0.64) / 0.05, 2)) + Math.exp(-Math.pow((u - 0.80) / 0.05, 2));
      v *= 1.0 - 0.16 * Math.min(1, wp);
      v = clamp01(v);
      const i4 = (y * S + x) * 4;
      const r = v * 132, g = v * 133, b = v * 138;
      idC.data[i4] = r; idC.data[i4 + 1] = g; idC.data[i4 + 2] = b; idC.data[i4 + 3] = 255;
      const ro = clamp01(0.86 - 0.12 * Math.min(1, wp) + 0.1 * (sp - 0.5)) * 255;
      idR.data[i4] = ro; idR.data[i4 + 1] = ro; idR.data[i4 + 2] = ro; idR.data[i4 + 3] = 255;
    }
  }
  xc.putImageData(idC, 0, 0); xr.putImageData(idR, 0, 0);
  // patch repairs: darker rectangles with rough edges
  for (let i = 0; i < 5; i++) {
    const px = rand() * S, py = rand() * S, pw = rrange(60, 170), ph = rrange(40, 110);
    xc.fillStyle = 'rgba(38,39,43,0.45)';
    xc.fillRect(px, py, pw, ph);
    xc.strokeStyle = 'rgba(12,12,14,0.7)'; xc.lineWidth = 4;
    xc.strokeRect(px, py, pw, ph);
  }
  // crack squiggles
  xc.strokeStyle = 'rgba(16,16,18,0.5)'; xc.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    let cx = rand() * S, cy = rand() * S;
    xc.beginPath(); xc.moveTo(cx, cy);
    for (let k = 0; k < 9; k++) { cx += rrange(-26, 26); cy += rrange(10, 36); xc.lineTo(cx, cy); }
    xc.stroke();
  }
  return { map: asTexture(cCol, true, 1, 12), rough: asTexture(cRgh, false, 1, 12) };
}

/* --- Granite setts (smågatsten): small square stones in courses,
       light Nordic greys with warm/cool variation. */
function makeSettsSet() {
  const S = 1024, COLS = 24, ROWS = 28;
  const cw = S / COLS, ch = S / ROWS;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S), cRgh = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d'), xr = cRgh.getContext('2d');
  xc.fillStyle = '#5c574e'; xc.fillRect(0, 0, S, S);
  xb.fillStyle = '#1a1a1a'; xb.fillRect(0, 0, S, S);
  xr.fillStyle = '#f0f0f0'; xr.fillRect(0, 0, S, S);
  const offs = [-S, 0, S];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const off = (r % 2) * cw * 0.5;
      const x0 = c * cw + off + cw * 0.5 + rrange(-1.2, 1.2);
      const y0 = r * ch + ch * 0.5 + rrange(-1.0, 1.0);
      const rx = cw * 0.46 * rrange(0.92, 1.02);
      const ry = ch * 0.45 * rrange(0.92, 1.02);
      const rot = rrange(-0.09, 0.09);
      const shade = rrange(0.88, 1.05);
      const tint = Math.floor(rand() * 3);
      let r0 = 150, g0 = 147, b0 = 142;
      if (tint === 1) { r0 += 8; g0 += 3; b0 -= 3; }
      if (tint === 2) { r0 -= 4; g0 -= 1; b0 += 5; }
      r0 *= shade; g0 *= shade; b0 *= shade;
      for (const ox of offs) for (const oy of offs) {
        const px = x0 + ox, py = y0 + oy;
        if (px < -cw * 2 || px > S + cw * 2 || py < -ch * 2 || py > S + ch * 2) continue;
        xc.save(); xc.translate(px, py); xc.rotate(rot);
        let gr = xc.createRadialGradient(-rx * 0.2, -ry * 0.25, 1, 0, 0, Math.max(rx, ry) * 1.15);
        gr.addColorStop(0, 'rgb(' + ((r0 * 1.12) | 0) + ',' + ((g0 * 1.12) | 0) + ',' + ((b0 * 1.12) | 0) + ')');
        gr.addColorStop(0.72, 'rgb(' + (r0 | 0) + ',' + (g0 | 0) + ',' + (b0 | 0) + ')');
        gr.addColorStop(1, 'rgb(' + ((r0 * 0.8) | 0) + ',' + ((g0 * 0.8) | 0) + ',' + ((b0 * 0.8) | 0) + ')');
        xc.fillStyle = gr;
        xc.beginPath();
        xc.moveTo(-rx, -ry * 0.82); xc.lineTo(-rx * 0.82, -ry); xc.lineTo(rx * 0.82, -ry);
        xc.lineTo(rx, -ry * 0.82); xc.lineTo(rx, ry * 0.82); xc.lineTo(rx * 0.82, ry);
        xc.lineTo(-rx * 0.82, ry); xc.lineTo(-rx, ry * 0.82);
        xc.closePath(); xc.fill();
        xc.restore();
        xb.save(); xb.translate(px, py); xb.rotate(rot);
        gr = xb.createRadialGradient(0, 0, 1, 0, 0, Math.max(rx, ry) * 1.1);
        gr.addColorStop(0, 'rgb(215,215,215)');
        gr.addColorStop(0.82, 'rgb(150,150,150)');
        gr.addColorStop(1, 'rgb(40,40,40)');
        xb.fillStyle = gr;
        xb.fillRect(-rx, -ry, rx * 2, ry * 2);
        xb.restore();
        xr.save(); xr.translate(px, py); xr.rotate(rot);
        gr = xr.createRadialGradient(0, 0, 1, 0, 0, Math.max(rx, ry));
        gr.addColorStop(0, 'rgb(150,150,150)');
        gr.addColorStop(1, 'rgb(228,228,228)');
        xr.fillStyle = gr;
        xr.fillRect(-rx, -ry, rx * 2, ry * 2);
        xr.restore();
      }
    }
  }
  return {
    map: asTexture(cCol, true, 3.4, 20),
    bump: asTexture(cBmp, false, 3.4, 20),
    rough: asTexture(cRgh, false, 3.4, 20)
  };
}

/* --- Large smooth granite slabs for the walking bands. */
function makeSlabSet() {
  const S = 512, COLS = 2, ROWS = 5;
  const cw = S / COLS, ch = S / ROWS;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  const n1 = makeValueNoise(6001);
  xc.fillStyle = '#4e4a44'; xc.fillRect(0, 0, S, S);
  xb.fillStyle = '#a0a0a0'; xb.fillRect(0, 0, S, S);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const off = (r % 2) * cw * 0.5;
      const x0 = ((c * cw + off) % S + S) % S;
      const y0 = r * ch;
      const shade = rrange(0.88, 1.06);
      for (const ox of [-S, 0, S]) {
        xc.save(); xc.translate(ox, 0);
        const gr = xc.createLinearGradient(x0, y0, x0 + cw, y0 + ch);
        gr.addColorStop(0, 'rgb(' + (172 * shade | 0) + ',' + (170 * shade | 0) + ',' + (165 * shade | 0) + ')');
        gr.addColorStop(1, 'rgb(' + (150 * shade | 0) + ',' + (148 * shade | 0) + ',' + (144 * shade | 0) + ')');
        xc.fillStyle = gr;
        xc.fillRect(x0 + 3, y0 + 3, cw - 6, ch - 6);
        xc.restore();
        xb.save(); xb.translate(ox, 0);
        xb.fillStyle = '#cdcdcd';
        xb.fillRect(x0 + 3, y0 + 3, cw - 6, ch - 6);
        xb.restore();
      }
    }
  }
  // speckle
  const idC = xc.getImageData(0, 0, S, S);
  for (let i = 0; i < S * S; i++) {
    const sp = n1((i % S) * 0.9, (i / S | 0) * 0.9);
    if (sp > 0.84) { idC.data[i * 4] += 18; idC.data[i * 4 + 1] += 18; idC.data[i * 4 + 2] += 18; }
    else if (sp < 0.12) { idC.data[i * 4] -= 16; idC.data[i * 4 + 1] -= 16; idC.data[i * 4 + 2] -= 14; }
  }
  xc.putImageData(idC, 0, 0);
  return { map: asTexture(cCol, true, 1.2, 40), bump: asTexture(cBmp, false, 1.2, 40) };
}

/* --- Today's cramped concrete sidewalk: square pavers, grime. */
function makeSidewalkSet() {
  const S = 512;
  const cCol = makeCanvas(S, S), cBmp = makeCanvas(S, S);
  const xc = cCol.getContext('2d'), xb = cBmp.getContext('2d');
  const n1 = makeValueNoise(7001);
  xc.fillStyle = '#8b8a85'; xc.fillRect(0, 0, S, S);
  xb.fillStyle = '#b0b0b0'; xb.fillRect(0, 0, S, S);
  const idC = xc.getImageData(0, 0, S, S);
  for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
    const v = (fbm(n1, x * 0.05, y * 0.05, 4) - 0.5) * 38;
    const i4 = (y * S + x) * 4;
    idC.data[i4] += v; idC.data[i4 + 1] += v; idC.data[i4 + 2] += v;
  }
  xc.putImageData(idC, 0, 0);
  // grime spots and gum
  for (let i = 0; i < 90; i++) {
    xc.fillStyle = 'rgba(40,40,42,' + rrange(0.08, 0.3) + ')';
    xc.beginPath(); xc.arc(rand() * S, rand() * S, rrange(2, 9), 0, 6.28); xc.fill();
  }
  // paver joints every 128 px
  for (let k = 0; k < S; k += 128) {
    xc.fillStyle = 'rgba(35,34,32,0.65)';
    xc.fillRect(k, 0, 3, S); xc.fillRect(0, k, S, 3);
    xb.fillStyle = '#404040';
    xb.fillRect(k, 0, 3, S); xb.fillRect(0, k, S, 3);
  }
  return { map: asTexture(cCol, true, 1, 52), bump: asTexture(cBmp, false, 1, 52) };
}

/* --- Cycle path band: oxide-red smooth surface, centre dashes,
       a bike pictogram per tile. Repeats along the street. */
function makeCycleTexture() {
  const W = 256, H = 1024;
  const c = makeCanvas(W, H), x = c.getContext('2d');
  const n1 = makeValueNoise(8001);
  x.fillStyle = '#74463a'; x.fillRect(0, 0, W, H);
  const id = x.getImageData(0, 0, W, H);
  for (let yy = 0; yy < H; yy++) for (let xx = 0; xx < W; xx++) {
    const v = (fbm(n1, xx * 0.08, yy * 0.08, 3) - 0.5) * 26;
    const i4 = (yy * W + xx) * 4;
    id.data[i4] += v; id.data[i4 + 1] += v * 0.9; id.data[i4 + 2] += v * 0.8;
  }
  x.putImageData(id, 0, 0);
  // centre dashed line separating the two directions
  x.fillStyle = 'rgba(238,236,228,0.85)';

/* --- Tall Stockholm cross-post window (korspostfönster):
       two small panes over two tall panes, white frame. */
function makeWindowTexture(lit) {
  const W = 256, H = 408;
  const c = makeCanvas(W, H), x = c.getContext('2d');
  const fr = x.createLinearGradient(0, 0, W, H);
  fr.addColorStop(0, '#f2efe6'); fr.addColorStop(1, '#d6d2c4');
  x.fillStyle = fr; x.fillRect(0, 0, W, H);
  x.fillStyle = 'rgba(110,104,90,0.4)';
  x.fillRect(0, H - 18, W, 18);
  const M = 20, BAR = 11;
  const crossY = M + Math.floor((H - 2 * M) * 0.30);
  function pane(px, py, pw, ph) {
    let g;
    if (lit) {
      g = x.createRadialGradient(px + pw * 0.5, py + ph * 0.6, 4, px + pw * 0.5, py + ph * 0.6, pw * 1.1);
      g.addColorStop(0, '#ffd793'); g.addColorStop(0.55, '#df9650'); g.addColorStop(1, '#774726');
    } else {
      g = x.createLinearGradient(px, py, px + pw, py + ph);
      g.addColorStop(0, '#5d6c7c'); g.addColorStop(0.5, '#33404e'); g.addColorStop(1, '#222c38');
    }
    x.fillStyle = g; x.fillRect(px, py, pw, ph);
    x.fillStyle = lit ? 'rgba(255,242,205,0.16)' : 'rgba(218,230,242,0.26)';
    x.beginPath();
    x.moveTo(px + pw * 0.08, py + ph); x.lineTo(px + pw * 0.42, py);
    x.lineTo(px + pw * 0.66, py); x.lineTo(px + pw * 0.3, py + ph);
    x.closePath(); x.fill();
    x.strokeStyle = 'rgba(0,0,0,0.45)'; x.lineWidth = 3;
    x.strokeRect(px + 1.5, py + 1.5, pw - 3, ph - 3);
  }
  const pw = (W - 2 * M - BAR) / 2;
  pane(M, M, pw, crossY - M - BAR / 2);
  pane(M + pw + BAR, M, pw, crossY - M - BAR / 2);
  pane(M, crossY + BAR / 2, pw, H - 18 - M - crossY - BAR / 2);
  pane(M + pw + BAR, crossY + BAR / 2, pw, H - 18 - M - crossY - BAR / 2);
  x.strokeStyle = 'rgba(255,255,255,0.5)'; x.lineWidth = 3;
  x.strokeRect(3, 3, W - 6, H - 6);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  t.anisotropy = 8;
  return t;
}

    '  vec3 zen = mix(zenA, zenB, uMood);',
    '  vec3 hor = mix(horA, horB, uMood);',
    '  float t = pow(clamp(h * 1.4 + 0.03, 0.0, 1.0), 0.6);',
    '  vec3 col = mix(hor, zen, t);',
    '  float s = max(dot(dir, uSunDir), 0.0);',
    '  col += mix(vec3(0.5), vec3(1.15, 0.78, 0.46), uMood) * pow(s, 6.0) * (0.20 + 0.25 * uMood);',
    '  col += vec3(1.4, 1.15, 0.85) * pow(s, 70.0) * 0.9;',
    '  col += vec3(2.6, 2.3, 1.9) * smoothstep(0.9995, 0.99995, s) * 5.0;',
    '  if (h < 0.0) col *= 1.0 / (1.0 - h * 6.0);',
    '  gl_FragColor = vec4(col, 1.0);',
    '  #include <tonemapping_fragment>',

  ].join('\n')
});

/* ============================================================
   Sloped plane helper — every ground layer follows gY(z).
   ============================================================ */
function slopedPlane(w, l, segW, segL, xCenter, yLift, mat, noiseAmp) {
  const geo = new THREE.PlaneGeometry(w, l, segW, segL);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const n = makeValueNoise(7777);
  for (let i = 0; i < pos.count; i++) {
    const gx = pos.getX(i) + xCenter, gz = pos.getZ(i);
    let y = gY(gz) + yLift;
    if (noiseAmp) y += (fbm(n, gx * 0.7, gz * 0.7, 3) - 0.5) * noiseAmp;
    pos.setY(i, y);
  }
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(xCenter, 0, 0);
  mesh.receiveShadow = true;
  return mesh;
}

const tmpObj = new THREE.Object3D();
function localMat(group, lx, ly, lz, rx, ry, rz, sx, sy, sz) {
  tmpObj.position.set(lx, ly, lz);
  tmpObj.rotation.set(rx || 0, ry || 0, rz || 0);
  tmpObj.scale.set(sx || 1, sy || 1, sz || 1);
  tmpObj.updateMatrix();
  const m = new THREE.Matrix4();
  if (group) {
    group.updateMatrix();
    m.multiplyMatrices(group.matrix, tmpObj.matrix);
  } else {
    m.copy(tmpObj.matrix);
  }
  return m;
}
function bake(geo, mat, mats, opts) {
  opts = opts || {};
  if (!mats.length) return null;
  const im = new THREE.InstancedMesh(geo, mat, mats.length);
  for (let i = 0; i < mats.length; i++) {
    if (mats[i].m) {
      im.setMatrixAt(i, mats[i].m);
      im.setColorAt(i, mats[i].c);
    } else {
      im.setMatrixAt(i, mats[i]);
    }
  }
  if (im.instanceColor) im.instanceColor.needsUpdate = true;
  im.castShadow = !!opts.shadow;
  im.receiveShadow = true;
  (opts.parent || scene).add(im);
  return im;
}
// cylinder between two points, baked into a geometry list
function pushCyl(list, p1, p2, r1, r2, radial) {
  const a = new THREE.Vector3(p1[0], p1[1], p1[2]);
  const b = new THREE.Vector3(p2[0], p2[1], p2[2]);
  const dir = b.clone().sub(a);
  const len = dir.length();
  const g = new THREE.CylinderGeometry(r2, r1, len, radial || 7);
  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
  const m = new THREE.Matrix4().compose(
    a.clone().add(b).multiplyScalar(0.5), q, new THREE.Vector3(1, 1, 1));
  g.applyMatrix4(m);
  list.push(g.toNonIndexed());
}
function boxAt(list, w, h, d, x, y, z, ry) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.Matrix4().compose(
    new THREE.Vector3(x, y, z),
    new THREE.Quaternion().setFromEuler(new THREE.Euler(0, ry || 0, 0)),
    new THREE.Vector3(1, 1, 1));
  g.applyMatrix4(m);
  list.push(g.toNonIndexed());
}

/* ============================================================
   Roof builder (ridge parallel to the street)
   ============================================================ */
const ROOF_TEX_W = 2.2, ROOF_TEX_H = 3.0;
function makeRoofGeo(w, d, h) {
  const pos = [], uv = [];
  function quad(a, b, c, dd, su, sv) {
    const u1 = su / ROOF_TEX_W, v1 = sv / ROOF_TEX_H;
    pos.push(a[0],a[1],a[2], b[0],b[1],b[2], c[0],c[1],c[2]);
    pos.push(a[0],a[1],a[2], c[0],c[1],c[2], dd[0],dd[1],dd[2]);
    uv.push(0,0, u1,0, u1,v1, 0,0, u1,v1, 0,v1);
  }
  const slope = Math.hypot(d / 2, h);
  quad([-w/2,0,d/2],[w/2,0,d/2],[w/2,h,0],[-w/2,h,0], w, slope);
  quad([w/2,0,-d/2],[-w/2,0,-d/2],[-w/2,h,0],[w/2,h,0], w, slope);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  g.computeVertexNormals();
  return g;
}
function makeRoofEndsGeo(w, d, h) {
  const pos = [], uv = [];
  function tri(a, b, c) {
    pos.push(a[0],a[1],a[2], b[0],b[1],b[2], c[0],c[1],c[2]);
    uv.push(0,0, 1,0, 0.5,1);
  }
  tri([w/2,0,d/2],[w/2,0,-d/2],[w/2,h,0]);
  tri([-w/2,0,-d/2],[-w/2,0,d/2],[-w/2,h,0]);
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  g.computeVertexNormals();
  return g;
}

function addBlock(bx, bz, yaw, width, depth, opts) {
  opts = opts || {};
  const floors = opts.floors || (4 + Math.floor(rand() * 2));   // upper floors: 4-5
  const y0 = gY(bz) - 0.35;
  const wallH = GROUND_H + floors * FLOOR_H + 0.45;
  const mat = plasterMats[opts.colorIdx !== undefined ? opts.colorIdx : pickColor()];

  const g = new THREE.Group();
  g.position.set(bx, y0, bz);
  g.rotation.y = yaw;
  g.updateMatrix();
  scene.add(g);

  const walls = new THREE.Mesh(new THREE.BoxGeometry(width, wallH, depth), mat);
  walls.position.y = wallH / 2;
  walls.castShadow = true; walls.receiveShadow = true;
  g.add(walls);

  const fz = depth / 2;

  // cornice + ground-floor band (instanced, scaled to width)
  corniceList.push(localMat(g, 0, wallH - 0.05, fz - 0.02, 0, 0, 0, width + 0.3, 1, 1));
  bandList.push(localMat(g, 0, GROUND_H + 0.1, fz + 0.01, 0, 0, 0, width + 0.1, 1, 1));

  // tin roof
  const roofH = rrange(2.2, 3.0);
  const roof = new THREE.Mesh(makeRoofGeo(width + 0.35, depth + 0.7, roofH), roofMat);
  roof.position.y = wallH + 0.05;
  roof.castShadow = true; roof.receiveShadow = true;
  g.add(roof);
  const ends = new THREE.Mesh(makeRoofEndsGeo(width + 0.35, depth + 0.7, roofH), mat);
  ends.position.y = wallH + 0.05;
  g.add(ends);

  // dormers facing the street
  if (rand() < 0.55 && !opts.noDormer) {
    const nd = 1 + Math.floor(rand() * 2);
    for (let i = 0; i < nd; i++) {
      const dx = (i - (nd - 1) / 2) * width * 0.3 + rrange(-0.5, 0.5);
      const dg = new THREE.Group();
      dg.position.set(dx, wallH + roofH * 0.36, depth * 0.26);
      const dw = new THREE.Mesh(dormerWallGeo, mat);
      dw.castShadow = true;
      dg.add(dw);
      const dr = new THREE.Mesh(makeRoofGeo(1.25, 1.1, 0.5), roofMat);
      dr.position.y = 0.55;
      dr.castShadow = true;
      dg.add(dr);
      g.add(dg);
      winDarkList.push(localMat(g, dx, wallH + roofH * 0.36, depth * 0.26 + 0.52, 0, 0, 0, 0.62, 0.5, 1));
    }
  }
  // chimneys
  const nCh = 1 + Math.floor(rand() * 2);
  for (let i = 0; i < nCh; i++) {
    const cx = (rand() - 0.5) * width * 0.6;
    const ch = new THREE.Mesh(chimneyGeo, chimneyMat);
    ch.position.set(cx, wallH + roofH * 0.8 + 0.3, rrange(-0.6, 0.6));
    ch.castShadow = true;
    g.add(ch);
    const cap = new THREE.Mesh(chimneyCapGeo, chimneyMat);
    cap.position.set(cx, wallH + roofH * 0.8 + 1.02, ch.position.z);
    g.add(cap);
  }

  // drainpipes at the party walls
  for (const dxp of [-width / 2 + 0.25, width / 2 - 0.25]) {
    drainList.push(localMat(g, dxp, wallH * 0.5, fz + 0.1, 0, 0, 0, 1, wallH - 0.4, 1));
  }

  /* ---- upper floors: window grid, balconies ---- */
  const nBays = Math.max(2, Math.floor((width - 1.2) / 1.95));
  const bayW = width / nBays;
  const balconyBay = rand() < 0.5 ? Math.floor(rand() * nBays) : -1;
  for (let f = 0; f < floors; f++) {
    const wy = GROUND_H + 1.35 + f * FLOOR_H;
    for (let k = 0; k < nBays; k++) {
      if (rand() < 0.04) continue;
      const lx = (k + 0.5) * bayW - width / 2;
      const m = localMat(g, lx, wy, fz + 0.02, 0, 0, 0, 1, 1, 1);
      if (rand() < 0.06) winLitList.push(m); else winDarkList.push(m);
      if (k === balconyBay && f >= 1 && f < floors - 1 && rand() < 0.7) {
        balconyList.push(localMat(g, lx, wy - 0.95, fz + 0.02, 0, 0, 0, 1, 1, 1));
      }
    }
  }

  /* ---- ground floor: shopfronts + an entry door ---- */
  if (!opts.noShops) {
    const units = [];
    let remaining = width - 0.6;
    let cursor = -width / 2 + 0.3;
    const doorUnit = Math.floor(rand() * 3);
    let ui = 0;
    while (remaining > 2.2) {
      let uw;
      if (ui === doorUnit) uw = 1.8;
      else uw = Math.min(remaining, rrange(3.8, 5.4));
      if (remaining - uw < 1.6 && remaining - uw > 0.01) uw = remaining;
      units.push({ x: cursor + uw / 2, w: uw, door: ui === doorUnit });
      cursor += uw; remaining -= uw; ui++;
    }
    for (const u of units) {
      if (u.door) {
        const porte = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 2.95), porteMat);
        porte.position.set(u.x, 0.35 + 1.5, fz + 0.03);
        g.add(porte);
        const step = new THREE.Mesh(stepGeo, graniteStepMat);
        step.position.set(u.x, 0.42, fz + 0.25);
        step.castShadow = true; step.receiveShadow = true;
        g.add(step);
      } else {
        const sm = shopfrontMats[shopCounter % shopfrontMats.length];
        shopCounter++;
        const shop = new THREE.Mesh(new THREE.PlaneGeometry(u.w - 0.15, 3.65), sm);
        shop.position.set(u.x, 0.35 + 1.85, fz + 0.025);
        g.add(shop);
        if (rand() < 0.4) addAwning(g, u.x, u.w - 0.6, fz);
        if (rand() < 0.3) {
          const sign = makeShopSign(shopCounter);
          sign.position.set(u.x + u.w * 0.35, 3.55, fz);
          g.add(sign);
        }
      }
    }
  }
  return g;
}

/* ---- procedural low-poly cars: extruded silhouettes ---- */
function carBodyShape(suv) {
  const s = new THREE.Shape();
  if (!suv) {
    s.moveTo(-2.25, 0.30); s.lineTo(-2.32, 0.62); s.lineTo(-2.18, 0.90);
    s.lineTo(-0.80, 0.97); s.lineTo(1.05, 0.95); s.lineTo(1.45, 0.82);
    s.lineTo(2.22, 0.76); s.lineTo(2.30, 0.48); s.lineTo(2.18, 0.30);
  } else {
    s.moveTo(-2.30, 0.32); s.lineTo(-2.36, 1.00); s.lineTo(-2.18, 1.06);
    s.lineTo(1.10, 1.06); s.lineTo(1.55, 0.94); s.lineTo(2.30, 0.88);
    s.lineTo(2.38, 0.50); s.lineTo(2.26, 0.32);
  }
  s.closePath();
  return s;
}
function carGlassShape(suv) {
  const s = new THREE.Shape();
  if (!suv) {
    s.moveTo(-1.62, 0.95); s.lineTo(-1.24, 1.44); s.lineTo(0.66, 1.44); s.lineTo(1.10, 0.94);
  } else {
    s.moveTo(-2.08, 1.05); s.lineTo(-1.98, 1.64); s.lineTo(0.78, 1.64); s.lineTo(1.28, 1.04);
  }
  s.closePath();
  return s;
}
function buildCarGeos(suv) {
  const paintParts = [];
  const body = new THREE.ExtrudeGeometry(carBodyShape(suv), { depth: 1.78, bevelEnabled: false });
  body.translate(0, 0, -0.89);
  paintParts.push(body);
  // roof slab over the greenhouse
  const roofY = suv ? 1.64 : 1.44;
  const roofLen = suv ? 2.66 : 1.78;
  const roofCx = suv ? -0.62 : -0.32;
  boxAt(paintParts, roofLen, 0.08, 1.62, roofCx, roofY + 0.04, 0);
  // mirrors
  boxAt(paintParts, 0.12, 0.1, 0.22, suv ? 1.32 : 1.14, suv ? 1.12 : 1.02, 0.97);
  boxAt(paintParts, 0.12, 0.1, 0.22, suv ? 1.32 : 1.14, suv ? 1.12 : 1.02, -0.97);
  const paintGeo = mergeGeometries(paintParts, false);

  const glass = new THREE.ExtrudeGeometry(carGlassShape(suv), { depth: 1.6, bevelEnabled: false });
  glass.translate(0, 0, -0.8);

  const darkParts = [];
  for (const wx of [1.42, -1.42]) for (const wz of [0.78, -0.78]) {
    const wheel = new THREE.CylinderGeometry(0.34, 0.34, 0.24, 14);
    wheel.rotateX(Math.PI / 2);
    wheel.translate(wx, 0.34, wz);
    darkParts.push(wheel.toNonIndexed());
  }
  boxAt(darkParts, 0.16, 0.26, 1.8, suv ? 2.42 : 2.34, 0.42, 0);   // front bumper
  boxAt(darkParts, 0.16, 0.26, 1.8, suv ? -2.4 : -2.36, 0.42, 0);  // rear bumper
  boxAt(darkParts, 3.4, 0.2, 1.6, 0, 0.26, 0);                     // underbody
  const darkGeo = mergeGeometries(darkParts, false);
  return { paint: paintGeo, glass: glass, dark: darkGeo };
}

function addLinden(tx, tz, big) {
  const gy = gY(tz);
  const h = big ? rrange(3.2, 3.8) : rrange(2.6, 3.1);
  trunkList.push(localMat(null, tx, gy + h / 2, tz, 0, rand() * 3, 0, 1, h / 3.2, 1));
  const crownY = gy + h;
  for (let i = 0; i < 4; i++) {
    const ang = i * 1.57 + rand() * 0.8;
    limbList.push(localMat(null,
      tx + Math.cos(ang) * 0.45, crownY + 0.55, tz + Math.sin(ang) * 0.45,
      Math.cos(ang) * 0.75, 0, Math.sin(ang) * 0.75, 1, 1, 1));
  }
  const R = big ? 1.55 : 1.25;
  const blobs = [[0, 1.1, 0], [0.9, 0.75, 0.35], [-0.85, 0.8, -0.3], [0.15, 0.7, 0.95], [-0.2, 0.85, -0.9]];
  for (const b of blobs) {
    for (let i = 0; i < 105; i++) {
      const th = rand() * Math.PI * 2, ph = Math.acos(2 * rand() - 1);
      const rr = R * 0.78 * Math.cbrt(rand());
      const lx = tx + b[0] + rr * Math.sin(ph) * Math.cos(th);
      const ly = crownY + b[1] + rr * Math.cos(ph) * 0.85;
      const lz = tz + b[2] + rr * Math.sin(ph) * Math.sin(th);
      leafList.push({
        m: localMat(null, lx, ly, lz, rand() * 3.1, rand() * 3.1, rand() * 3.1,
          rrange(1.7, 2.7), rrange(1.7, 2.7), 1),
        c: new THREE.Color(TREE_GREENS[Math.floor(rand() * TREE_GREENS.length)])
      });
    }
  }
  obstacles.push({ x: tx, z: tz, r: 0.55, state: 'R' });
}

/* ============================================================
   The BEFORE / AFTER transition engine
   ============================================================ */
let target = 0;       // 0 = today, 1 = reimagined
let P = 0;            // animated progress
const TRANS_SPEED = 1 / 1.7;   // full morph in ~1.7 s

const SUN_A = new THREE.Color(0xf3eee6), SUN_B = new THREE.Color(0xffdfae);
const HEMI_A = new THREE.Color(0xa9b6c4), HEMI_B = new THREE.Color(0x9fc3e8);
const HG_A = new THREE.Color(0x7e7e7c), HG_B = new THREE.Color(0x7f9a68);
const FOG_A = new THREE.Color(0xc6d0da), FOG_B = new THREE.Color(0xd4e2ec);

function applyState() {
  // asphalt, markings, sidewalks crossfade away
  const fade = 1 - smooth01(clamp01(P * 1.7));
  for (const m of todayFadeMats) m.opacity = m.userData.baseOp * fade;
  // cars and street clutter also sink into the ground
  const sink = smooth01(clamp01((P - 0.06) / 0.7));
  todaySink.position.y = -3.4 * sink;
  todayGroup.visible = P < 0.995;
  // greenery and café life scale up out of the paving
  const grow = smooth01(clamp01((P - 0.2) / 0.8));
  reimGroup.scale.y = Math.max(0.001, grow);
  reimGroup.visible = P > 0.005;
  // ambiance grading: grey traffic light -> warm green afternoon
  sun.color.copy(SUN_A).lerp(SUN_B, P);
  sun.intensity = 2.4 + 0.75 * P;
  hemi.color.copy(HEMI_A).lerp(HEMI_B, P);
  hemi.groundColor.copy(HG_A).lerp(HG_B, P);
  hemi.intensity = 1.0 + 0.2 * P;
  scene.fog.color.copy(FOG_A).lerp(FOG_B, P);
  renderer.toneMappingExposure = 1.04 + 0.13 * P;
  skyUniforms.uMood.value = P;
}
applyState();

const toggleEl = document.getElementById('toggle');
function setMode(m) {
  target = m;
  toggleEl.classList.toggle('reim', m === 1);
}
toggleEl.addEventListener('click', function () { setMode(target === 0 ? 1 : 0); });

/* ============================================================
   First-person navigation on OrbitControls: drag to look,
   WASD to walk. Starts on an elevated hero angle and glides
   down to eye level on the first step.
   ============================================================ */
const HERO_H = 5.4;
let heroMode = true;
let camH = HERO_H;
const startZ = 48;
camera.position.set(-1.6, gY(startZ) + HERO_H, startZ);
{
  const lookAt = new THREE.Vector3(0.6, gY(16) + 1.6, 16);
  const dir = lookAt.sub(camera.position).normalize().multiplyScalar(0.7);
  const tgt = camera.position.clone().add(dir);
  var controls = new OrbitControls(camera, renderer.domElement);
  controls.enableZoom = false;
  controls.enablePan = false;
  controls.enableDamping = true;
  controls.dampingFactor = 0.12;
  controls.rotateSpeed = -0.32;          // inverted: drag like turning your head
  controls.minPolarAngle = 0.62;
  controls.maxPolarAngle = 2.1;
  controls.target.copy(tgt);
  controls.update();
}

const keys = {};
window.addEventListener('keydown', function (e) {
  keys[e.code] = true;
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Space'].indexOf(e.code) >= 0) e.preventDefault();
  if ((e.code === 'KeyT' || e.code === 'Space') && !e.repeat) setMode(target === 0 ? 1 : 0);
});
window.addEventListener('keyup', function (e) { keys[e.code] = false; });

const fwdVec = new THREE.Vector3(), rightVec = new THREE.Vector3(), moveVec = new THREE.Vector3();
function applyMovement(dt) {
  fwdVec.subVectors(controls.target, camera.position);
  fwdVec.y = 0;
  if (fwdVec.lengthSq() < 1e-8) fwdVec.set(0, 0, -1);
  fwdVec.normalize();
  rightVec.crossVectors(fwdVec, camera.up).normalize();
  moveVec.set(0, 0, 0);
  if (keys.KeyW || keys.ArrowUp) moveVec.add(fwdVec);
  if (keys.KeyS || keys.ArrowDown) moveVec.sub(fwdVec);
  if (keys.KeyD || keys.ArrowRight) moveVec.add(rightVec);
  if (keys.KeyA || keys.ArrowLeft) moveVec.sub(rightVec);
  if (moveVec.lengthSq() > 0) {
    heroMode = false;
    const speed = (keys.ShiftLeft || keys.ShiftRight) ? 6.4 : 3.2;
    moveVec.normalize().multiplyScalar(speed * dt);
    camera.position.add(moveVec);
    controls.target.add(moveVec);
  }
  // keep inside the street canyon
  let px = camera.position.x, pz = camera.position.z;
  pz = Math.min(54, Math.max(-56, pz));
  px = Math.min(10.2, Math.max(-10.2, px));
  // push out of state-appropriate obstacles
  for (const ob of obstacles) {
    if (ob.state === 'T' && P >= 0.5) continue;
    if (ob.state === 'R' && P < 0.5) continue;
    const dx = px - ob.x, dz = pz - ob.z;
    const d2 = dx * dx + dz * dz;
    if (d2 < ob.r * ob.r && d2 > 1e-6) {
      const d = Math.sqrt(d2);
      px = ob.x + dx / d * ob.r;
      pz = ob.z + dz / d * ob.r;
    }
  }
  const ddx = px - camera.position.x, ddz = pz - camera.position.z;
  camera.position.x = px; camera.position.z = pz;
  controls.target.x += ddx; controls.target.z += ddz;
  // glide from hero height to eye level, then stay pinned, pitch preserved
  const wantH = heroMode ? HERO_H : EYE;
  camH += (wantH - camH) * Math.min(1, dt * 2.2);
  const gy = gY(pz) + camH;
  const dy = gy - camera.position.y;
  camera.position.y = gy;
  controls.target.y += dy;
}

/* ============================================================
   Resize + main loop
   ============================================================ */
window.addEventListener('resize', function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
let elapsed = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;
  applyMovement(dt);
  controls.update();
  // morph between the two streets
  if (P !== target) {
    P += Math.sign(target - P) * dt * TRANS_SPEED;
    P = clamp01(P);
    if (Math.abs(P - target) < 0.002) P = target;
    applyState();
  }
  // cyclists glide along the cycle path once the new street is in
  if (P > 0.55) {
    for (const cy of cyclists) {
      cy.z += cy.dir * cy.speed * dt;
      if (cy.z > 57) cy.z = -57;
      if (cy.z < -57) cy.z = 57;
      cy.g.position.z = cy.z;
      cy.g.position.y = gY(cy.z);
      cy.g.rotation.z = 0.04 * Math.sin(elapsed * 2.2 + cy.x);
    }
  }
  for (const S of swingSigns) {
    S.g.rotation.z = 0.06 * Math.sin(elapsed * 1.2 + S.phase);
  }
  renderer.render(scene, camera);
}
animate();
window.__gotgatan = {
  scene: scene, camera: camera, controls: controls, renderer: renderer, setMode: setMode,
  setProgress: function (p) {       // jump the morph to a given point (debug / capture)
    P = clamp01(p);
    target = Math.round(P);
    toggleEl.classList.toggle('reim', target === 1);
    applyState();
  }
};
